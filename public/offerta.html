<!doctype html>
<html lang="it">
  <head>
    <script nowprocket data-noptimize="1" data-cfasync="false" data-wpfc-render="false" seraph-accel-crit="1" data-no-defer="1">
      (function () {
          var script = document.createElement("script");
          script.async = 1;
          script.src = 'https://tp-em.com/NTI2MjM3.js?t=526237';
          document.head.appendChild(script);
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offerta - Partiamo</title>
    <link rel="icon" href="/partiamo-logo-banner.svg" type="image/svg+xml" sizes="any" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container booking-results-page">
      <section class="card fade-up offer-hero flight-offer-card">
        <div class="offer-topline" style="margin-bottom: 12px">
          <p id="countdown"></p>
          <span class="badge">Valida per 6 ore</span>
        </div>
        <h1 class="booking-page-title" style="margin-bottom: 8px">La tua offerta</h1>

        <div class="flight-hero">
          <img id="flightHeroImg" src="" alt="Volo" width="1400" height="560" />
          <span class="flight-hero-badge">Volo</span>
        </div>
        <div class="flight-body">
          <p class="flight-route" id="flightRoute"></p>
          <p class="booking-meta flight-dates"><span id="dateVolo"></span></p>
          <div class="flight-chips">
            <span class="flight-chip" id="fascia"></span>
            <span class="flight-chip" id="tipoVolo"></span>
            <span class="flight-chip" id="compagnia"></span>
          </div>
          <div class="flight-footer">
            <div>
              <p class="flight-price-label">Prezzo volo</p>
              <p class="booking-price flight-price-amount" id="prezzoVolo"></p>
            </div>
            <div class="flight-cta-row flight-cta-row--hero">
              <a id="voloLinkTop" href="#" target="_blank" rel="noopener noreferrer sponsored" style="display: none"
                ><button type="button" class="btn btn-booking flight-cta">Voli su Kiwi.com</button></a
              >
              <a id="airHelpLinkTop" href="#" target="_blank" rel="noopener noreferrer sponsored" style="display: none"
                ><button type="button" class="btn btn-outline-partiamo flight-cta">AirHelp — diritti passeggeri</button></a
              >
            </div>
          </div>
          <p class="booking-meta flight-package-line">
            <strong>Totale pacchetto:</strong> <span id="prezzo"></span> · <span id="risparmio"></span>
          </p>
        </div>
      </section>

      <h3 class="booking-section-heading">Alloggio nel budget</h3>
      <section class="offer-grid" id="hotelGrid"></section>
      <p class="hotel-partner-note" id="hotelPartnerNote">
        Alloggio nel budget residuo su Klook: i risultati sono ordinati dal prezzo più basso. Verifica sempre il totale sul sito Klook prima di prenotare.
      </p>
      <p id="error"></p>
    </main>
    <script src="/offerta.js"></script>
  </body>
</html>
